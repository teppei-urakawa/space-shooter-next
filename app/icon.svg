<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <filter id="glow-cyan" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-fire" x="-100%" y="-50%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-laser" x="-200%" y="-20%" width="500%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg-grad" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#000d1f"/>
      <stop offset="100%" stop-color="#000510"/>
    </radialGradient>
  </defs>

  <!-- 宇宙背景 -->
  <rect width="32" height="32" rx="5" fill="url(#bg-grad)"/>

  <!-- 星々 -->
  <circle cx="4"  cy="4"  r="0.6" fill="white" opacity="0.9"/>
  <circle cx="29" cy="6"  r="0.5" fill="white" opacity="0.7"/>
  <circle cx="10" cy="2"  r="0.4" fill="#00f5ff" opacity="0.9"/>
  <circle cx="27" cy="22" r="0.6" fill="white" opacity="0.6"/>
  <circle cx="2"  cy="26" r="0.5" fill="white" opacity="0.8"/>
  <circle cx="24" cy="2"  r="0.4" fill="white" opacity="0.5"/>
  <circle cx="6"  cy="17" r="0.4" fill="white" opacity="0.4"/>
  <circle cx="30" cy="14" r="0.5" fill="#ff00ff" opacity="0.5"/>
  <circle cx="2"  cy="12" r="0.4" fill="white" opacity="0.6"/>

  <!-- レーザー弾 -->
  <rect x="15.3" y="1.5" width="1.4" height="7" rx="0.7"
        fill="#00f5ff" opacity="0.95" filter="url(#glow-laser)"/>

  <!-- 左ウィング -->
  <polygon points="12,20 4,28 10,22"
           fill="#001828" stroke="#0099cc" stroke-width="0.7" stroke-linejoin="round"/>
  <!-- 左ウィングのネオンライン -->
  <line x1="11.5" y1="20.5" x2="5.5" y2="26.5" stroke="#00f5ff" stroke-width="0.35" opacity="0.55"/>

  <!-- 右ウィング -->
  <polygon points="20,20 28,28 22,22"
           fill="#001828" stroke="#0099cc" stroke-width="0.7" stroke-linejoin="round"/>
  <!-- 右ウィングのネオンライン -->
  <line x1="20.5" y1="20.5" x2="26.5" y2="26.5" stroke="#00f5ff" stroke-width="0.35" opacity="0.55"/>

  <!-- 機体メインボディ -->
  <polygon points="16,8 21,23 16,21 11,23"
           fill="#001525" stroke="#00f5ff" stroke-width="0.9" stroke-linejoin="round"
           filter="url(#glow-cyan)"/>

  <!-- 機体センターライン -->
  <line x1="16" y1="10" x2="16" y2="20.5" stroke="#00f5ff" stroke-width="0.3" opacity="0.4"/>

  <!-- コックピット窓 -->
  <ellipse cx="16" cy="14.5" rx="1.9" ry="2.4"
           fill="#00f5ff" opacity="0.15"/>
  <ellipse cx="16" cy="14.5" rx="1.9" ry="2.4"
           stroke="#00f5ff" stroke-width="0.65" fill="none" opacity="0.9"
           filter="url(#glow-cyan)"/>

  <!-- エンジン炎（左） -->
  <rect x="12.8" y="22" width="2.4" height="6" rx="1.2"
        fill="#ff6600" opacity="0.8" filter="url(#glow-fire)"/>
  <rect x="13.2" y="22" width="1.6" height="4" rx="0.8"
        fill="#ffd700" opacity="0.95"/>
  <rect x="13.5" y="22" width="1.0" height="2.5" rx="0.5"
        fill="white" opacity="0.7"/>

  <!-- エンジン炎（右） -->
  <rect x="16.8" y="22" width="2.4" height="6" rx="1.2"
        fill="#ff6600" opacity="0.8" filter="url(#glow-fire)"/>
  <rect x="17.2" y="22" width="1.6" height="4" rx="0.8"
        fill="#ffd700" opacity="0.95"/>
  <rect x="17.5" y="22" width="1.0" height="2.5" rx="0.5"
        fill="white" opacity="0.7"/>
</svg>
